<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>软件设计12法（汇报版）思维导图</title>
  <style>
    :root {
      --bg1: #f8fbff;
      --bg2: #e8f2ff;
      --line: #8ca7c7;
      --root: #0f355f;
      --lvl1: #1d5ea1;
      --lvl2: #2f77ba;
      --leaf: #eff6ff;
      --leaf-border: #b6cae6;
      --text-light: #f8fbff;
      --text-dark: #133252;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(1200px 800px at 20% 20%, #ffffff 0%, var(--bg2) 45%, var(--bg1) 100%);
      font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      margin: 0 auto;
    }
    #title {
      position: absolute;
      left: clamp(24px, 2vw, 80px);
      top: clamp(16px, 1.2vw, 40px);
      font-size: clamp(24px, 1.3vw, 58px);
      font-weight: 700;
      color: #16385e;
      letter-spacing: 1px;
    }
    svg {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }
    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 4;
      opacity: 0.95;
    }
    .node rect {
      stroke-width: 2;
    }
    .depth-0 rect {
      fill: var(--root);
      stroke: #0a2a4b;
      filter: drop-shadow(0 10px 18px rgba(15,53,95,0.22));
    }
    .depth-1 rect {
      fill: var(--lvl1);
      stroke: #154b80;
      filter: drop-shadow(0 7px 13px rgba(29,94,161,0.20));
    }
    .depth-2 rect {
      fill: var(--lvl2);
      stroke: #235f96;
      filter: drop-shadow(0 5px 10px rgba(47,119,186,0.16));
    }
    .depth-3 rect {
      fill: var(--leaf);
      stroke: var(--leaf-border);
      filter: drop-shadow(0 3px 7px rgba(20,50,82,0.10));
    }
    .depth-0 text,
    .depth-1 text,
    .depth-2 text {
      fill: var(--text-light);
    }
    .depth-3 text {
      fill: var(--text-dark);
    }
    .node text {
      font-size: 28px;
      font-weight: 600;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="title">软件设计12法（汇报版）思维导图</div>
    <svg viewBox="0 0 4000 2300" aria-label="mindmap"></svg>
  </div>

  <script>
    const tree = {
      name: "软件设计12法（汇报版）",
      children: [
        { name: "核心结论", children: [
          { name: "先性能" },
          { name: "再可用" },
          { name: "后扩展" },
        ]},
        { name: "高性能", children: [
          { name: "多级缓存" },
          { name: "读写分离" },
          { name: "数据分区" },
          { name: "异步并发" },
        ]},
        { name: "高可用", children: [
          { name: "熔断限流" },
          { name: "池化技术" },
          { name: "副本冗余" },
          { name: "去中心化" },
        ]},
        { name: "可扩展", children: [
          { name: "微服务" },
          { name: "消息队列" },
          { name: "无状态" },
          { name: "插件化" },
        ]},
        { name: "落地方法", children: [
          { name: "选1-2个最痛点先做" },
          { name: "指标驱动评估收益" },
          { name: "保留回滚路径" },
        ]},
      ],
    };

    const svg = document.querySelector("svg");

    function leafCount(node) {
      if (!node.children || node.children.length === 0) return 1;
      return node.children.reduce((acc, c) => acc + leafCount(c), 0);
    }

    function layout(node, depth, y0, y1) {
      node.depth = depth;
      node.x = 250 + depth * 820;
      node.y = (y0 + y1) / 2;
      if (!node.children || node.children.length === 0) return;
      const total = leafCount(node);
      let cursor = y0;
      for (const child of node.children) {
        const span = (y1 - y0) * (leafCount(child) / total);
        layout(child, depth + 1, cursor, cursor + span);
        cursor += span;
      }
    }

    layout(tree, 0, 200, 2200);

    const nodes = [];
    const links = [];

    function collect(node, parent = null) {
      nodes.push(node);
      if (parent) links.push({ source: parent, target: node });
      if (node.children) {
        for (const c of node.children) collect(c, node);
      }
    }

    collect(tree);

    function sizeByDepth(depth, text) {
      if (depth === 0) return { w: 620, h: 110, r: 24 };
      if (depth === 1) return { w: 320, h: 88, r: 18 };
      if (depth === 2) return { w: 260, h: 74, r: 16 };
      const w = Math.max(230, Math.min(460, 55 + text.length * 30));
      return { w, h: 68, r: 14 };
    }

    for (const link of links) {
      const s = sizeByDepth(link.source.depth, link.source.name);
      const t = sizeByDepth(link.target.depth, link.target.name);
      const x1 = link.source.x + s.w / 2;
      const y1 = link.source.y;
      const x2 = link.target.x - t.w / 2;
      const y2 = link.target.y;
      const c1 = x1 + 120;
      const c2 = x2 - 120;

      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("class", "link");
      p.setAttribute("d", `M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}`);
      svg.appendChild(p);
    }

    for (const node of nodes) {
      const { w, h, r } = sizeByDepth(node.depth, node.name);
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("class", `node depth-${node.depth}`);

      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", node.x - w / 2);
      rect.setAttribute("y", node.y - h / 2);
      rect.setAttribute("rx", r);
      rect.setAttribute("ry", r);
      rect.setAttribute("width", w);
      rect.setAttribute("height", h);

      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", node.x);
      text.setAttribute("y", node.y + 1);
      text.textContent = node.name;

      g.appendChild(rect);
      g.appendChild(text);
      svg.appendChild(g);
    }
  </script>
</body>
</html>
